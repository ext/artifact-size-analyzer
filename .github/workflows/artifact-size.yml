name: Artifact size

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze-base:
    name: Analyze (base)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Checkout head branch (action)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          path: head

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package
        run: npm pack

      - name: Run analyzer (base)
        uses: ./head/analyze
        with:
          config-file: ./example-config.json
          artifact-name: base-size
          use-local: true

  analyze-current:
    name: Analyze (current)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package
        run: npm pack

      - name: Run analyzer (current)
        uses: ./analyze
        with:
          config-file: ./example-config.json
          artifact-name: current-size
          use-local: true

  compare:
    name: Compare
    runs-on: ubuntu-latest
    needs: [analyze-base, analyze-current]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Compare results
        id: compare
        uses: ./compare
        with:
          base-artifact: base-size
          current-artifact: current-size
          use-local: true

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: artifact-size-analyzer
          message: |
            ${{ steps.compare.outputs.markdown }}

            <details><summary>Raw JSON</summary>

            ```json
            ${{ steps.compare.outputs.json }}
            ```

            </details>
